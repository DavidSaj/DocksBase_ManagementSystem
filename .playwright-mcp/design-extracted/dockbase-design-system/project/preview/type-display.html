<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-serif); background: #fff; padding: 24px 28px; }
.specimen { margin-bottom: 18px; border-bottom: var(--border-whisper); padding-bottom: 16px; }
.specimen:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.meta { font-size: 11px; color: var(--color-gray-300); font-weight: 500; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
</style>
</head><body>
  <div class="specimen">
    <div class="meta">Display Hero — 64px / 700 / lh 1.00 / ls -2.125px</div>
    <div style="font-family:var(--font-serif); font-size:64px; font-weight:700; line-height:1.00; letter-spacing:-2px; color:rgba(0,0,0,0.95);">Harbor Management</div>
  </div>
  <div class="specimen">
    <div class="meta">Display 2 — 54px / 700 / lh 1.04 / ls -1.875px</div>
    <div style="font-family:var(--font-serif); font-size:54px; font-weight:700; line-height:1.04; letter-spacing:-1px; color:rgba(0,0,0,0.95);">Berth Allocation</div>
  </div>
  <div class="specimen">
    <div class="meta">Section Heading — 48px / 700 / lh 1.00 / ls -1.5px</div>
    <div style="font-family:var(--font-serif); font-size:48px; font-weight:700; line-height:1.00; letter-spacing:-0.5px; color:rgba(0,0,0,0.95);">Vessel Registry</div>
  </div>
</body></html>
